kind = "web"
previewPath = "/"
title = "AI Experience"
version = "1.0.0"
id = "artifacts/ai-page"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18762

[services.development]
run = "pnpm --filter @workspace/ai-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-page", "run", "build" ]
publicDir = "artifacts/ai-page/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18762"
BASE_PATH = "/"
